<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARVR Studio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

body{
margin:0;
background:linear-gradient(180deg,#0b0f1a,#020617);
color:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

/* HEADER */

.header{
position:sticky;
top:0;
z-index:1000;
background:rgba(15,23,42,.85);
backdrop-filter:blur(20px);
padding:14px 18px;
font-weight:600;
font-size:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* SEARCH */

.search-box{
padding:10px 15px;
}

.search-box input{
width:100%;
border-radius:12px;
border:none;
padding:10px;
background:#0f172a;
color:white;
}

/* CARDS */

.card-ar{
background:rgba(255,255,255,.04);
border-radius:18px;
padding:12px;
transition:.25s;
position:relative;
}

.card-ar:hover{
transform:translateY(-4px);
box-shadow:0 8px 25px rgba(0,240,255,.15);
}

.card-ar h6{
font-size:14px;
margin-bottom:8px;
color:#e2e8f0;
}

/* IMAGE */

.preview{
width:100%;
height:150px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

/* MODEL */

model-viewer{
width:100%;
height:150px;
border-radius:12px;
margin-bottom:10px;
}

/* BUTTON */

.btn-ar{
background:#06b6d4;
border:none;
border-radius:10px;
width:100%;
padding:8px;
font-size:14px;
}

/* DELETE */

.delete-btn{
position:absolute;
top:8px;
right:8px;
width:26px;
height:26px;
border-radius:50%;
background:#ef4444;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:13px;
text-decoration:none;
}

/* FLOAT CREATE */

.create-btn{
position:fixed;
bottom:80px;
right:20px;
width:55px;
height:55px;
background:#06b6d4;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

/* GRID FIX */

.project-grid{
padding:10px 15px 100px;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#0f172a;
display:flex;
justify-content:space-around;
padding:8px 0;
border-top:1px solid rgba(255,255,255,.08);
}

.bottom-nav a{
color:#cbd5e1;
font-size:12px;
text-align:center;
text-decoration:none;
}

.bottom-nav a span{
display:block;
font-size:20px;
}

/* MOBILE GRID */

@media(max-width:768px){

.project-grid .col{
flex:0 0 50%;
max-width:50%;
}

}

</style>

</head>

<body>

<div class="header">
ARVR Studio
</div>

<div class="search-box">
<input type="text" placeholder="Search projects...">
</div>

<div class="container-fluid project-grid">

<div class="row g-3">

{% for p in projects %}

<div class="col">

<div class="card-ar">

<a href="{{ url_for('delete_project', id=p.id) }}"
onclick="return confirm('Delete project?')"
class="delete-btn">✕</a>

<h6>{{ p.name }}</h6>

{% if p.type == 'model' %}

<model-viewer
src="{{ p.file_url }}"
camera-controls
auto-rotate
shadow-intensity="1"
ar>
</model-viewer>

<a href="{{ url_for('model_ar', project_id=p.id) }}"
class="btn btn-ar">
View AR
</a>

{% else %}

<img src="{{ p.file_url }}" class="preview">

<a href="{{ url_for('image_ar', project_id=p.id) }}"
class="btn btn-ar">
View AR
</a>

{% endif %}

</div>

</div>

{% endfor %}

</div>

</div>

<!-- Floating Create Button -->

<a href="/create" class="create-btn">
+
</a>

<!-- Bottom Navigation -->

<div class="bottom-nav">

<a href="/">
<span>🏠</span>
Home
</a>

<a href="/create">
<span>➕</span>
Create
</a>

<a href="/wall-ar">
<span>🧱</span>
Wall AR
</a>

<a href="/logout">
<span>🚪</span>
Logout
</a>

</div>

</body>
</html>
