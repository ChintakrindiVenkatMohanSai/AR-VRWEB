<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AR Viewer</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

/* ===== GLOBAL ===== */

html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Segoe UI;
height:100%;
touch-action:none;
}

/* ===== CAMERA ===== */

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:1;
pointer-events:none;
}

/* ===== UI MESSAGE ===== */

.arUI{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.6);
color:white;
padding:12px 24px;
border-radius:30px;
font-size:14px;
z-index:2000;
backdrop-filter:blur(10px);
}

/* ===== AR IMAGE ===== */

.arImage{
position:fixed;
top:50%;
left:50%;
width:320px;
border-radius:24px;
cursor:grab;
z-index:10;

box-shadow:
0 40px 120px rgba(0,0,0,.6);

transition:transform .2s ease;
}

.arImage img{
width:100%;
border-radius:24px;
pointer-events:none;
}

/* ===== CAPTURE BUTTON ===== */

.captureBtn{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#0072ff;
border:none;
padding:15px 50px;
border-radius:50px;
color:white;
font-size:18px;
z-index:2000;
cursor:pointer;
}

</style>
</head>

<body>

<!-- CAMERA -->
<video id="cam" autoplay playsinline muted></video>

<!-- UI -->
<div class="arUI">
Drag and pinch to resize the image
</div>

<!-- AR IMAGE -->
<div class="arImage" id="plate">
<img src="{{ project.file_url }}" crossorigin="anonymous">
</div>

<!-- CAPTURE -->
<button class="captureBtn" id="captureBtn">
📸 Capture
</button>

<script>

/* ===== CAMERA ===== */

const cam=document.getElementById("cam");

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{
cam.srcObject=stream;
})
.catch(()=>{
alert("Camera requires HTTPS.");
});


/* ===== VARIABLES ===== */

let plate=document.getElementById("plate");

let x=0;
let y=0;
let scale=1;

let startX=0;
let startY=0;


/* ===== UPDATE ===== */

function update(){

plate.style.transform =
`translate(-50%,-50%)
 translate(${x}px,${y}px)
 scale(${scale})`;

}


/* ===== MOUSE DRAG ===== */

plate.addEventListener("mousedown",e=>{

startX=e.clientX-x;
startY=e.clientY-y;

function move(e){

x=e.clientX-startX;
y=e.clientY-startY;

update();

}

function stop(){

document.removeEventListener("mousemove",move);
document.removeEventListener("mouseup",stop);

}

document.addEventListener("mousemove",move);
document.addEventListener("mouseup",stop);

});


/* ===== TOUCH DRAG ===== */

plate.addEventListener("touchstart",e=>{

if(e.touches.length===1){

let touch=e.touches[0];

startX=touch.clientX-x;
startY=touch.clientY-y;

}

});


plate.addEventListener("touchmove",e=>{

if(e.touches.length===1){

let touch=e.touches[0];

x=touch.clientX-startX;
y=touch.clientY-startY;

update();

}

});


/* ===== PINCH ZOOM ===== */

let initialDistance=null;
let initialScale=1;

plate.addEventListener("touchstart",function(e){

if(e.touches.length===2){

initialDistance=getDistance(e.touches[0],e.touches[1]);
initialScale=scale;

}

});


plate.addEventListener("touchmove",function(e){

if(e.touches.length===2){

e.preventDefault();

let newDistance=getDistance(e.touches[0],e.touches[1]);

scale=initialScale*(newDistance/initialDistance);

scale=Math.max(0.3,Math.min(scale,4));

update();

}

});


function getDistance(t1,t2){

let dx=t1.clientX-t2.clientX;
let dy=t1.clientY-t2.clientY;

return Math.sqrt(dx*dx+dy*dy);

}


/* ===== MOUSE WHEEL ZOOM ===== */

plate.addEventListener("wheel",e=>{

e.preventDefault();

scale+=e.deltaY*-0.001;

scale=Math.max(.3,Math.min(scale,3));

update();

});


/* ===== CAPTURE ===== */

document.getElementById("captureBtn").addEventListener("click",async()=>{

const canvas=document.createElement("canvas");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const ctx=canvas.getContext("2d");

/* draw camera */

ctx.drawImage(cam,0,0,canvas.width,canvas.height);

/* capture AR image */

const arCanvas=await html2canvas(plate,{
backgroundColor:null,
useCORS:true
});

const rect=plate.getBoundingClientRect();

ctx.drawImage(
arCanvas,
rect.left,
rect.top,
rect.width,
rect.height
);

/* download */

const link=document.createElement("a");

link.download="AR_capture.png";

link.href=canvas.toDataURL();

link.click();

});


update();

</script>

</body>
</html>
